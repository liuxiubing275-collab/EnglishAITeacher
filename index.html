<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 英语私教</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; color: #333; }
        h1 { text-align: center; color: #2c3e50; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background-color: #007aff; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; width: 100%; margin-top: 10px; cursor: pointer; }
        button:active { background-color: #005bb5; }
        .row-buttons { display: flex; gap: 10px; } 
        .row-buttons button { margin-top: 10px; }
        textarea, input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 18px; }
        #wordResult, #dictationResult { margin-top: 10px; font-weight: bold; min-height: 24px;}
        .word-counter { font-size: 14px; color: #7f8c8d; float: right; }
        
        /* 单词模糊特效 */
        #targetWord { transition: filter 0.3s ease; cursor: pointer; }
        .hint-text { font-size: 12px; color: #95a5a6; text-align: center; display: block; margin-top: -10px; }
    </style>
</head>
<body>

    <h1>🚀 AI 英语私教</h1>

    <!-- 全局控制区：当前单词 -->
    <div class="card" style="border: 2px solid #3498db;">
        <h2>🗣️ 当前学习单词
            <span id="wordCounter" class="word-counter">1/1</span>
        </h2>
        <p>
            <strong style="font-size: 32px; color: #27ae60; display: block; text-align: center; margin: 15px 0;" id="targetWord" onclick="toggleBlur()">加载中...</strong>
            <span class="hint-text">👆 点击播放发音时会自动模糊遮挡单词</span>
        </p>
        
        <div class="row-buttons">
            <button onclick="readTargetWord()" style="background-color: #27ae60;">🔊 听标准发音</button>
            <button onclick="startListeningForWord()" style="background-color: #e67e22;">🎤 按住跟读</button>
        </div>
        <p id="wordResult"></p>
        
        <button onclick="nextWord()" style="background-color: #34495e;">⏭️ 切换下一个单词</button>
    </div>

    <!-- 功能区：听写练习 -->
    <div class="card">
        <h2>✍️ 盲听拼写</h2>
        <p style="font-size: 14px; color: #7f8c8d;">不看上面的单词，听发音并拼写出来：</p>
        
        <button onclick="readTargetWord()" style="background-color: #8e44ad; margin-top: 0;">🔊 播放当前单词发音</button>
        
        <!-- 输入框：回车直接提交 -->
        <input type="text" id="dictationInput" placeholder="请输入听到的单词拼写..." autocomplete="off" autocorrect="off" autocapitalize="none" onkeypress="if(event.key === 'Enter') checkDictation()">
        
        <button onclick="checkDictation()" style="background-color: #2980b9;">✅ 提交检查</button>
        <p id="dictationResult"></p>
    </div>

    <!-- 功能区：文章朗读 -->
    <div class="card">
        <h2>📖 自由朗读</h2>
        <textarea id="articleText" rows="3">Hello! I am your English teacher. Let's practice.</textarea>
        <button onclick="speakText()">🔊 朗读输入框内容</button>
    </div>

    <script>
        // --- 核心变量 ---
        let wordList = ["Apple"]; 
        let currentIndex = 0;

        // --- 1. 读取 NewWorks.txt ---
        async function loadWords() {
            try {
                const response = await fetch('NewWorks.txt');
                if (!response.ok) throw new Error('无法读取文件');
                const text = await response.text();
                
                wordList = text.split(/,|\s{2,}|\n/)
                               .map(w => w.trim())          
                               .filter(w => w.length > 0);  
                
                if (wordList.length > 0) {
                    currentIndex = 0;
                    updateWordDisplay();
                } else {
                    document.getElementById('targetWord').innerText = "单词库为空";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('targetWord').innerText = "未找到词库文件";
            }
        }

        // --- 2. 更新界面显示的单词 ---
        function updateWordDisplay() {
            document.getElementById('targetWord').innerText = wordList[currentIndex];
            document.getElementById('wordCounter').innerText = `${currentIndex + 1} / ${wordList.length}`;
            
            // 清空状态
            document.getElementById('wordResult').innerText = ""; 
            document.getElementById('dictationInput').value = ""; 
            document.getElementById('dictationResult').innerText = "";
            
            // 确保切换新单词时，单词默认是清晰的，方便先学习
            document.getElementById('targetWord').style.filter = 'none';
        }

        // --- 3. 切换下一个单词 ---
        function nextWord() {
            if (wordList.length === 0) return;
            currentIndex = (currentIndex + 1) % wordList.length; 
            updateWordDisplay();
        }

        // --- 4. 手动点击模糊/清晰 ---
        function toggleBlur() {
            const wordEl = document.getElementById('targetWord');
            if (wordEl.style.filter === 'blur(8px)') {
                wordEl.style.filter = 'none';
            } else {
                wordEl.style.filter = 'blur(8px)';
            }
        }

        // --- 5. 语音合成 (TTS) ---
        function speakText(textOverride) {
            const text = textOverride || document.getElementById('articleText').value;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        }

        function readTargetWord() {
            // 【核心修改点 1】：每次点击播放发音时，强制将单词模糊处理
            document.getElementById('targetWord').style.filter = 'blur(8px)';
            
            speakText(wordList[currentIndex]);
            
            // 自动把光标移入听写框，方便直接打字（针对手机可能不会自动弹键盘，但体验更好）
            document.getElementById('dictationInput').focus(); 
        }

        // --- 6. 语音跟读 (STT) ---
        function startListeningForWord() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("请在 iPhone 自带的 Safari 浏览器中使用此功能。");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            document.getElementById('wordResult').style.color = "#333";
            document.getElementById('wordResult').innerText = "正在聆听...请说话";
            recognition.start();

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript.toLowerCase().replace(/[.,!?]/g, '').trim();
                const target = wordList[currentIndex].toLowerCase().trim();
                const resultEl = document.getElementById('wordResult');
                if (transcript === target) {
                    resultEl.style.color = "#27ae60";
                    resultEl.innerHTML = `✅ 完美！你读作: "${transcript}"`;
                } else {
                    resultEl.style.color = "#e74c3c";
                    resultEl.innerHTML = `❌ 差一点，你读作: "${transcript}"`;
                }
            };
            recognition.onerror = function() {
                document.getElementById('wordResult').innerText = "未听到声音，请重试。";
            };
        }

        // --- 7. 听写检查功能 ---
        function checkDictation() {
            const userInput = document.getElementById('dictationInput').value.toLowerCase().trim();
            const targetWord = wordList[currentIndex].toLowerCase().trim();
            const resultEl = document.getElementById('dictationResult');

            if (userInput === "") {
                resultEl.style.color = "#f39c12";
                resultEl.innerText = "⚠️ 请先输入单词拼写！";
                return;
            }

            if (userInput === targetWord) {
                resultEl.style.color = "#27ae60";
                resultEl.innerHTML = `✅ 完全正确！拼写为: <strong>${wordList[currentIndex]}</strong>`;
                
                // 【核心修改点 2】：听写完全正确后，自动取消模糊，让你再看一眼清晰的单词
                document.getElementById('targetWord').style.filter = 'none';
                
                // 隐藏键盘
                document.getElementById('dictationInput').blur(); 
                
                // 延迟 1.5 秒后自动进入下一个单词
                setTimeout(() => {
                    nextWord();
                }, 1500);

            } else {
                resultEl.style.color = "#e74c3c";
                resultEl.innerHTML = `❌ 拼写错误。你输入的是 "${userInput}"，再听一遍试试！`;
            }
        }

        window.onload = loadWords;
    </script>
</body>
</html>
