<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 英语私教</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background-color: #f2f2f7; color: #333; }
        h1 { text-align: center; color: #1c1c1e; font-size: 24px; margin-bottom: 20px; }
        
        /* 导航栏 */
        .nav-bar { display: flex; background-color: #e3e3e8; border-radius: 10px; padding: 4px; margin-bottom: 20px; }
        .nav-btn { flex: 1; background: transparent; color: #8e8e93; border: none; padding: 10px 0; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: 0.3s ease; }
        .nav-btn.active { background: white; color: #007aff; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .page-section { display: none; animation: fadeIn 0.3s ease; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 卡片与通用样式 */
        .card { background: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { font-size: 18px; margin-top: 0; color: #2c3e50; display: flex; justify-content: space-between; align-items: center; }
        
        button.action-btn { background-color: #007aff; color: white; border: none; padding: 14px 20px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        button.action-btn:active { opacity: 0.8; }
        .row-buttons { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; } 
        .row-buttons button { margin-top: 10px; flex: 1; min-width: 40%; }
        
        input[type="text"], select { width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; border: 1px solid #d1d1d6; box-sizing: border-box; font-size: 16px; background-color: #fafafa; }
        
        /* 单词与中文释义样式 */
        .result-text { margin-top: 10px; font-weight: bold; min-height: 24px; font-size: 15px; }
        #targetWord { transition: filter 0.3s ease; cursor: pointer; }
        #chineseMeaning { text-align: center; font-size: 22px; color: #8e44ad; font-weight: bold; display: none; margin: 15px 0 0 0; animation: fadeIn 0.3s ease;}

        /* 文章专属样式 */
        .article-display { background-color: #f8f9fa; padding: 15px; border-radius: 10px; font-size: 18px; line-height: 1.6; color: #2c3e50; border: 1px solid #e9ecef; margin-top: 10px; }
        .diff-result { margin-top: 15px; padding: 15px; border-radius: 10px; background-color: #fff; border: 2px dashed #bdc3c7; font-size: 16px; line-height: 1.6; display: none; }
    </style>
</head>
<body>

    <h1>🚀 AI 英语私教</h1>

    <div class="nav-bar">
        <button id="btn-words" class="nav-btn active" onclick="switchTab('words')">单词练习</button>
        <button id="btn-articles" class="nav-btn" onclick="switchTab('articles')">文章跟读</button>
        <button id="btn-chat" class="nav-btn" onclick="switchTab('chat')">互动聊天</button>
    </div>

    <!-- ================= 页面 1：单词练习 ================= -->
    <div id="page-words" class="page-section active">
        <div class="card" style="border: 2px solid #3498db;">
            <h2>🗣️ 单词发音与跟读 <span id="wordCounter" style="font-size: 14px; color: #8e8e93; font-weight: normal;">1/1</span></h2>
            
            <p>
                <strong style="font-size: 36px; color: #27ae60; display: block; text-align: center; margin: 15px 0 5px 0;" id="targetWord" onclick="toggleBlur()">加载中...</strong>
                <span style="font-size: 12px; color: #95a5a6; text-align: center; display: block;">👆 点击播放发音时会自动模糊单词</span>
            </p>

            <p id="chineseMeaning">苹果</p>
            
            <div class="row-buttons">
                <button class="action-btn" onclick="readTargetWord()" style="background-color: #27ae60;">🔊 听标准音</button>
                <button class="action-btn" onclick="startListeningForWord()" style="background-color: #e67e22;">🎤 按住跟读</button>
            </div>

            <button class="action-btn" onclick="toggleMeaning()" style="background-color: #9b59b6;">👀 查看 / 隐藏中文意思</button>
            
            <p id="wordResult" class="result-text"></p>
            
            <!-- 新增：从头开始按钮 -->
            <div class="row-buttons">
                <button class="action-btn" onclick="restartWords()" style="background-color: #7f8c8d;">🔄 从头开始</button>
                <button class="action-btn" onclick="nextWord()" style="background-color: #34495e;">⏭️ 下一个单词</button>
            </div>
        </div>

        <div class="card">
            <h2>✍️ 盲听拼写</h2>
            <button class="action-btn" onclick="readTargetWord()" style="background-color: #8e44ad; margin-top: 0;">🔊 播放发音</button>
            <input type="text" id="dictationInput" placeholder="输入拼写 (按回车提交)..." autocomplete="off" autocorrect="off" autocapitalize="none" onkeypress="if(event.key === 'Enter') checkDictation()">
            <button class="action-btn" onclick="checkDictation()" style="background-color: #2980b9;">✅ 提交检查</button>
            <p id="dictationResult" class="result-text"></p>
        </div>
    </div>

    <!-- ================= 页面 2：文章跟读 ================= -->
    <div id="page-articles" class="page-section">
        <div class="card">
            <h2>📖 智能文章跟读 
                <select id="articleSelect" onchange="changeArticle()" style="width: auto; padding: 5px; margin: 0; font-size: 14px;">
                    <option value="0">加载中...</option>
                </select>
            </h2>
            <p style="font-size: 14px; color: #7f8c8d; margin-top: 5px;">听原音并跟读，AI 会自动为你纠错：</p>
            
            <div id="articleDisplay" class="article-display">文章加载中...</div>
            
            <!-- 新增：语速设置 -->
            <div class="row-buttons">
                <select id="speedSelect" style="width: 100%; padding: 12px; margin-top: 10px; border-radius: 12px; font-size: 15px; font-weight: bold; color: #2c3e50; border: 2px solid #8e44ad;">
                    <option value="0.5">🐢 0.5x 慢速朗读</option>
                    <option value="0.75">🚶 0.75x 较慢朗读</option>
                    <option value="1" selected>🏃 1.0x 正常语速</option>
                    <option value="1.25">🚴 1.25x 较快语速</option>
                    <option value="1.5">🚀 1.5x 极速挑战</option>
                </select>
            </div>

            <div class="row-buttons">
                <button class="action-btn" onclick="speakArticle()" style="background-color: #8e44ad;">🔊 老师范读</button>
                <button class="action-btn" onclick="startListeningForArticle()" style="background-color: #e67e22;">🎤 开始跟读</button>
            </div>
            
            <div id="diffResult" class="diff-result">
                <strong>🧐 纠错报告：</strong><br><span id="diffContent"></span>
                <p style="font-size: 12px; color: #7f8c8d; margin-top: 10px;">(绿色为发音正确，<span style="color:#e74c3c;text-decoration:line-through;">红色划线</span>为漏读或发音不准)</p>
            </div>
            
            <div class="row-buttons">
                <button class="action-btn" onclick="startListeningForArticle()" style="background-color: #3498db;">🔄 再试一次</button>
                <button class="action-btn" onclick="nextArticle()" style="background-color: #2c3e50;">⏭️ 下一段文章</button>
            </div>
        </div>
    </div>

    <!-- ================= 页面 3：互动聊天 ================= -->
    <div id="page-chat" class="page-section">
        <div class="card">
            <h2>🤖 AI 英语角 (开发中)</h2>
            <p style="font-size: 14px; color: #7f8c8d; margin-top: 0;">敬请期待大模型接入...</p>
        </div>
    </div>

    <script>
        // ================= 导航栏逻辑 =================
        function switchTab(tabName) {
            document.querySelectorAll('.page-section').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('page-' + tabName).classList.add('active');
            document.getElementById('btn-' + tabName).classList.add('active');
        }

        // ================= 数据加载逻辑 =================
        let wordList =[{ en: "Apple", zh: "苹果(示例)" }]; 
        let currentWordIndex = 0;
        
        let articleList =["Please create Texts.txt file."];
        let currentArticleIndex = 0;

        async function loadAllData() {
            // 1. 加载并解析 NewWords.txt (更改了文件名，且严格按照回车键分割)
            try {
                const wRes = await fetch('NewWords.txt');
                if (wRes.ok) {
                    const wText = await wRes.text();
                    // 核心修改：只按换行符(\n 或 \r\n)进行分割，一行一个单词
                    const rawWords = wText.split(/\r?\n/).map(w => w.trim()).filter(w => w.length > 0);  
                    
                    wordList = rawWords.map(item => {
                        const parts = item.split(/\||:|：/);
                        if (parts.length > 1) {
                            return { en: parts[0].trim(), zh: parts[1].trim() };
                        } else {
                            return { en: parts[0].trim(), zh: "暂无中文释义" };
                        }
                    });
                }
            } catch (e) { console.log("单词库未找到"); }
            if (wordList.length > 0) updateWordDisplay();

            // 2. 加载 Texts.txt
            try {
                const aRes = await fetch('Texts.txt');
                if (aRes.ok) {
                    const aText = await aRes.text();
                    articleList = aText.split(/---|(?:\r?\n){2,}/).map(a => a.trim()).filter(a => a.length > 0);
                }
            } catch (e) { console.log("文章库未找到"); }
            
            if (articleList.length > 0) {
                initArticleSelect();
                updateArticleDisplay();
            }
        }

        // ================= 单词练习逻辑 =================
        function updateWordDisplay() {
            document.getElementById('targetWord').innerText = wordList[currentWordIndex].en;
            document.getElementById('wordCounter').innerText = `${currentWordIndex + 1} / ${wordList.length}`;
            
            const meaningEl = document.getElementById('chineseMeaning');
            meaningEl.innerText = wordList[currentWordIndex].zh;
            meaningEl.style.display = 'none';

            document.getElementById('wordResult').innerText = ""; 
            document.getElementById('dictationInput').value = ""; 
            document.getElementById('dictationResult').innerText = "";
            document.getElementById('targetWord').style.filter = 'none';
        }

        function toggleMeaning() {
            const meaningEl = document.getElementById('chineseMeaning');
            meaningEl.style.display = meaningEl.style.display === 'none' ? 'block' : 'none';
        }

        function nextWord() {
            if (wordList.length === 0) return;
            currentWordIndex = (currentWordIndex + 1) % wordList.length; 
            updateWordDisplay();
        }

        // 新增：从头开始功能
        function restartWords() {
            if (wordList.length === 0) return;
            currentWordIndex = 0; // 进度归零
            updateWordDisplay();
        }

        function toggleBlur() {
            const wordEl = document.getElementById('targetWord');
            wordEl.style.filter = wordEl.style.filter === 'blur(8px)' ? 'none' : 'blur(8px)';
        }

        function readTargetWord() {
            document.getElementById('targetWord').style.filter = 'blur(8px)';
            const utterance = new SpeechSynthesisUtterance(wordList[currentWordIndex].en);
            utterance.lang = 'en-US'; 
            window.speechSynthesis.speak(utterance);
            setTimeout(() => { document.getElementById('dictationInput').focus(); }, 100);
        }

        function startListeningForWord() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("请在 iPhone Safari 中使用。");
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            document.getElementById('wordResult').style.color = "#333";
            document.getElementById('wordResult').innerText = "正在聆听...请说话";
            recognition.start();
            
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript.toLowerCase().replace(/[.,!?]/g, '').trim();
                const target = wordList[currentWordIndex].en.toLowerCase().trim();
                const resultEl = document.getElementById('wordResult');
                if (transcript === target) {
                    resultEl.style.color = "#27ae60"; resultEl.innerHTML = `✅ 完美！你读作: "${transcript}"`;
                } else {
                    resultEl.style.color = "#e74c3c"; resultEl.innerHTML = `❌ 差一点，你读作: "${transcript}"`;
                }
            };
        }

        function checkDictation() {
            const userInput = document.getElementById('dictationInput').value.toLowerCase().trim();
            const targetWord = wordList[currentWordIndex].en.toLowerCase().trim();
            const resultEl = document.getElementById('dictationResult');
            
            if (userInput === "") return resultEl.innerText = "⚠️ 请先输入单词！";
            if (userInput === targetWord) {
                resultEl.style.color = "#27ae60"; 
                resultEl.innerHTML = `✅ 完全正确！拼写为: <strong>${wordList[currentWordIndex].en}</strong>`;
                document.getElementById('targetWord').style.filter = 'none';
                document.getElementById('dictationInput').blur(); 
                setTimeout(() => { nextWord(); }, 1500);
            } else {
                resultEl.style.color = "#e74c3c"; 
                resultEl.innerHTML = `❌ 拼写错误。你输入的是 "${userInput}"`;
            }
        }

        // ================= 文章跟读逻辑 =================
        function initArticleSelect() {
            const select = document.getElementById('articleSelect');
            select.innerHTML = ''; 
            articleList.forEach((_, index) => {
                let option = document.createElement('option');
                option.value = index; option.text = `第 ${index + 1} 段`; select.appendChild(option);
            });
        }
        function changeArticle() { currentArticleIndex = parseInt(document.getElementById('articleSelect').value); updateArticleDisplay(); }
        function nextArticle() {
            if (articleList.length === 0) return;
            currentArticleIndex = (currentArticleIndex + 1) % articleList.length;
            document.getElementById('articleSelect').value = currentArticleIndex; updateArticleDisplay();
        }
        function updateArticleDisplay() {
            document.getElementById('articleDisplay').innerText = articleList[currentArticleIndex];
            document.getElementById('diffResult').style.display = 'none'; 
        }

        // 核心修改：朗读文章时读取语速设置
        function speakArticle() {
            const utterance = new SpeechSynthesisUtterance(articleList[currentArticleIndex]);
            utterance.lang = 'en-US'; 
            
            // 获取用户选择的语速
            const speed = parseFloat(document.getElementById('speedSelect').value);
            utterance.rate = speed; 
            
            window.speechSynthesis.speak(utterance);
        }

        function startListeningForArticle() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US'; recognition.interimResults = false; 
            const diffBox = document.getElementById('diffResult'), diffContent = document.getElementById('diffContent');
            diffBox.style.display = 'block'; diffBox.style.borderColor = '#e67e22';
            diffContent.innerHTML = "🎤 <strong>正在聆听，请朗读上方整段文章... (读完请停顿)</strong>";
            recognition.start();
            recognition.onresult = function(event) {
                const diffHTML = compareSentences(articleList[currentArticleIndex], event.results[0][0].transcript);
                diffBox.style.borderColor = '#27ae60'; diffContent.innerHTML = diffHTML;
            };
            recognition.onerror = () => { diffBox.style.borderColor = '#e74c3c'; diffContent.innerHTML = "⚠️ 未听到声音，请点击【再试一次】。"; };
        }
        function compareSentences(original, spoken) {
            let origWords = original.replace(/[.,!?'"]/g, '').toLowerCase().split(/\s+/);
            let spokenWords = spoken.replace(/[.,!?'"]/g, '').toLowerCase().split(/\s+/);
            let originalRawWords = original.split(/\s+/); 
            let resultHTML =[], spokenIdx = 0; 
            for (let i = 0; i < origWords.length; i++) {
                let found = false;
                for(let j = spokenIdx; j < Math.min(spokenIdx + 3, spokenWords.length); j++) {
                    if (origWords[i] === spokenWords[j]) { found = true; spokenIdx = j + 1; break; }
                }
                if (found) resultHTML.push(`<span style="color: #27ae60; font-weight: bold;">${originalRawWords[i]}</span>`);
                else resultHTML.push(`<span style="color: #e74c3c; text-decoration: line-through;">${originalRawWords[i]}</span>`);
            }
            return resultHTML.join(' ');
        }

        window.onload = loadAllData;
    </script>
</body>
</html>
