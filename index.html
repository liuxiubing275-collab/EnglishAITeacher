<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 英语私教</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; color: #333; }
        h1 { text-align: center; color: #2c3e50; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background-color: #007aff; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; width: 100%; margin-top: 10px; cursor: pointer; }
        button:active { background-color: #005bb5; }
        .row-buttons { display: flex; gap: 10px; } /* 让按钮并排 */
        .row-buttons button { margin-top: 10px; }
        textarea, input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        #wordResult { margin-top: 10px; font-weight: bold; min-height: 24px;}
        .word-counter { font-size: 14px; color: #7f8c8d; float: right; }
    </style>
</head>
<body>

    <h1>🚀 AI 英语私教</h1>

    <!-- 功能区 1：单词跟读 -->
    <div class="card">
        <h2>🗣️ 单词跟读练习
            <span id="wordCounter" class="word-counter">1/1</span>
        </h2>
        <p>当前单词：<strong style="font-size: 28px; color: #27ae60; display: block; text-align: center; margin: 15px 0;" id="targetWord">加载中...</strong></p>
        
        <div class="row-buttons">
            <button onclick="readTargetWord()" style="background-color: #27ae60;">🔊 听发音</button>
            <button onclick="startListeningForWord()" style="background-color: #e67e22;">🎤 按住读</button>
        </div>
        <button onclick="nextWord()" style="background-color: #34495e;">⏭️ 下一个单词</button>
        
        <p id="wordResult"></p>
    </div>

    <!-- 功能区 2：文章朗读 -->
    <div class="card">
        <h2>📖 文章朗读</h2>
        <textarea id="articleText" rows="3">Hello! I am your English teacher.</textarea>
        <button onclick="speakText()">🔊 朗读文章</button>
    </div>

    <script>
        // --- 核心：单词库变量 ---
        let wordList = ["Apple"]; // 默认备用单词
        let currentIndex = 0;

        // --- 1. 读取并解析 NewWorks.txt ---
        async function loadWords() {
            try {
                // 请求同目录下的 NewWorks.txt 文件
                const response = await fetch('NewWorks.txt');
                if (!response.ok) throw new Error('无法读取文件');
                
                const text = await response.text();
                
                // 核心逻辑：用正则把文本按“逗号”、“两个或以上空格”、“换行符”切开
                wordList = text.split(/,|\s{2,}|\n/)
                               .map(w => w.trim())          // 去除每个单词前后的多余空格
                               .filter(w => w.length > 0);  // 删掉空字符串
                
                if (wordList.length > 0) {
                    currentIndex = 0;
                    updateWordDisplay();
                } else {
                    document.getElementById('targetWord').innerText = "单词库为空";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('targetWord').innerText = "未找到 NewWorks.txt，使用默认词库";
                document.getElementById('wordCounter').innerText = "1/1";
            }
        }

        // --- 2. 更新界面显示的单词 ---
        function updateWordDisplay() {
            document.getElementById('targetWord').innerText = wordList[currentIndex];
            document.getElementById('wordCounter').innerText = `${currentIndex + 1} / ${wordList.length}`;
            document.getElementById('wordResult').innerText = ""; // 切换单词时清空上次的评分
        }

        // --- 3. 切换下一个单词 ---
        function nextWord() {
            if (wordList.length === 0) return;
            currentIndex = (currentIndex + 1) % wordList.length; // 取余数，实现循环播放
            updateWordDisplay();
        }

        // --- 4. 语音合成 (TTS) ---
        function speakText(textOverride) {
            const text = textOverride || document.getElementById('articleText').value;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.85; // 稍微放慢语速
            window.speechSynthesis.speak(utterance);
        }

        function readTargetWord() {
            speakText(wordList[currentIndex]);
        }

        // --- 5. 语音识别 (STT) 跟读 ---
        function startListeningForWord() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("你的浏览器暂不支持语音识别，请在 iPhone Safari 中使用。");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            document.getElementById('wordResult').style.color = "#333";
            document.getElementById('wordResult').innerText = "正在聆听...请说话";
            
            recognition.start();

            recognition.onresult = function(event) {
                // 获取你说的内容，并转成小写，去掉标点符号
                const transcript = event.results[0][0].transcript.toLowerCase().replace(/[.,!?]/g, '').trim();
                const target = wordList[currentIndex].toLowerCase().trim();
                
                const resultEl = document.getElementById('wordResult');
                if (transcript === target) {
                    resultEl.style.color = "#27ae60";
                    resultEl.innerHTML = `✅ 完美！你读作: "${transcript}"`;
                } else {
                    resultEl.style.color = "#e74c3c";
                    resultEl.innerHTML = `❌ 差一点，你读作: "${transcript}"，再试一次！`;
                }
            };

            recognition.onerror = function(event) {
                document.getElementById('wordResult').innerText = "未听到声音或麦克风未授权。";
            };
        }

        // 当页面加载完成时，自动执行读取单词库的函数
        window.onload = loadWords;
    </script>
</body>
</html>
